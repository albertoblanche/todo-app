<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Tareas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #F8F9FA;
  --surface:      #FFFFFF;
  --on-surface:   #202124;
  --secondary:    #5F6368;
  --border:       #E8EAED;
  --hover:        #F1F3F4;
  --blue:         #1A73E8;
  --blue-light:   #E8F0FE;
  --blue-text:    #1557B0;
  --orange:       #E37400;
  --orange-light: #FEF3E2;
  --orange-text:  #B06000;
  --green:        #188038;
  --green-light:  #E6F4EA;
  --green-text:   #116329;
  --red:          #D93025;
  --red-light:    #FCE8E6;
  --red-text:     #A50E0E;
  --radius:       8px;
  --shadow:       0 1px 3px rgba(60,64,67,.12), 0 1px 2px rgba(60,64,67,.10);
  --shadow-hover: 0 2px 6px rgba(60,64,67,.16), 0 1px 4px rgba(60,64,67,.12);
}

body {
  font-family: 'Google Sans Text', 'Google Sans', sans-serif;
  background: var(--bg);
  color: var(--on-surface);
  min-height: 100vh;
  padding: 0 0 80px;
}

/* Top bar */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.app-icon {
  width: 32px;
  height: 32px;
  background: var(--blue);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.app-icon svg { width: 18px; height: 18px; fill: white; }

h1 {
  font-family: 'Google Sans', sans-serif;
  font-size: 1.125rem;
  font-weight: 500;
  color: var(--on-surface);
}

.task-count {
  font-size: 0.8125rem;
  color: var(--secondary);
  background: var(--hover);
  padding: 3px 10px;
  border-radius: 12px;
}

/* Main */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* Add form */
.add-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 8px 8px 8px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 36px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, border-color 0.2s;
}

.add-form:focus-within {
  box-shadow: var(--shadow-hover);
  border-color: var(--blue);
}

.add-form input {
  flex: 1;
  border: none;
  outline: none;
  font-family: 'Google Sans Text', sans-serif;
  font-size: 0.9375rem;
  color: var(--on-surface);
  background: transparent;
  min-width: 0;
}

.add-form input::placeholder { color: #9AA0A6; }

.form-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

.priority-select {
  font-family: 'Google Sans Text', sans-serif;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--secondary);
  border: none;
  background: transparent;
  outline: none;
  cursor: pointer;
  padding: 4px 2px;
  min-width: 52px;
}

.add-btn {
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 10px 20px;
  font-family: 'Google Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
}

.add-btn:hover { background: var(--blue-text); box-shadow: 0 1px 4px rgba(26,115,232,.4); }

/* Board */
.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  align-items: start;
}

@media (max-width: 700px) { .board { grid-template-columns: 1fr; } }

.column {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.col-header {
  padding: 16px 16px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

.col-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

[data-col="todo"]     .col-dot { background: #9AA0A6; }
[data-col="progress"] .col-dot { background: var(--orange); }
[data-col="done"]     .col-dot { background: var(--green); }

.col-title {
  font-family: 'Google Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  flex: 1;
  color: var(--on-surface);
}

.col-badge {
  font-size: 0.75rem;
  font-weight: 500;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

[data-col="todo"]     .col-badge { background: var(--hover);       color: var(--secondary); }
[data-col="progress"] .col-badge { background: var(--orange-light); color: var(--orange-text); }
[data-col="done"]     .col-badge { background: var(--green-light);  color: var(--green-text); }

.col-body {
  padding: 10px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  position: relative;
  transition: box-shadow 0.15s, border-color 0.15s;
  animation: fadeUp 0.16s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card:hover { box-shadow: var(--shadow-hover); border-color: #DADCE0; }

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.pri-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  border-radius: 11px;
  font-size: 0.6875rem;
  font-weight: 500;
  flex-shrink: 0;
  margin-top: 1px;
  padding: 0 5px;
}

.p-high { background: var(--red-light);    color: var(--red-text); }
.p-mid  { background: var(--orange-light); color: var(--orange-text); }
.p-low  { background: var(--hover);        color: var(--secondary); }

.card-text {
  font-size: 0.875rem;
  line-height: 1.5;
  color: var(--on-surface);
  flex: 1;
  word-break: break-word;
  padding-right: 20px;
}

[data-col="done"] .card-text { color: var(--secondary); text-decoration: line-through; }

.del-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: #9AA0A6;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.12s, background 0.12s, color 0.12s;
}

.card:hover .del-btn { opacity: 1; }
.del-btn:hover { background: var(--red-light); color: var(--red); }

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  gap: 6px;
  flex-wrap: wrap;
}

.pri-row {
  display: flex;
  align-items: center;
  gap: 4px;
}

.pri-label {
  font-size: 0.6875rem;
  color: #9AA0A6;
}

.pri-sel {
  font-family: 'Google Sans Text', sans-serif;
  font-size: 0.75rem;
  color: var(--secondary);
  border: 1px solid var(--border);
  background: transparent;
  border-radius: 4px;
  padding: 2px 4px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.12s;
}

.pri-sel:hover { border-color: var(--blue); }

.move-chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.move-chip {
  font-family: 'Google Sans', sans-serif;
  font-size: 0.6875rem;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--secondary);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  white-space: nowrap;
}

.move-chip:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue-text); }

.empty-state {
  text-align: center;
  padding: 28px 16px;
  color: #9AA0A6;
}

.empty-state svg { width: 28px; height: 28px; margin-bottom: 8px; opacity: 0.4; display: block; margin-left: auto; margin-right: auto; }
.empty-state p { font-size: 0.8125rem; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="app-icon">
      <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <h1>Mis Tareas</h1>
  </div>
  <span class="task-count" id="task-count">Sin tareas</span>
</div>

<div class="main">
  <form class="add-form" onsubmit="addTask(event)">
    <input id="new-task" type="text" placeholder="Agregar una tarea..." autocomplete="off">
    <div class="form-divider"></div>
    <select id="new-priority" class="priority-select" title="Prioridad (10 = más urgente)">
      <option value="5">P5</option>
      <option value="10">P10</option>
      <option value="9">P9</option>
      <option value="8">P8</option>
      <option value="7">P7</option>
      <option value="6">P6</option>
      <option value="4">P4</option>
      <option value="3">P3</option>
      <option value="2">P2</option>
      <option value="1">P1</option>
    </select>
    <button type="submit" class="add-btn">Agregar</button>
  </form>

  <div class="board">
    <div class="column" data-col="todo">
      <div class="col-header">
        <span class="col-dot"></span>
        <span class="col-title">Por hacer</span>
        <span class="col-badge" id="badge-todo">0</span>
      </div>
      <div class="col-body" id="col-todo"></div>
    </div>

    <div class="column" data-col="progress">
      <div class="col-header">
        <span class="col-dot"></span>
        <span class="col-title">En progreso</span>
        <span class="col-badge" id="badge-progress">0</span>
      </div>
      <div class="col-body" id="col-progress"></div>
    </div>

    <div class="column" data-col="done">
      <div class="col-header">
        <span class="col-dot"></span>
        <span class="col-title">Hecho</span>
        <span class="col-badge" id="badge-done">0</span>
      </div>
      <div class="col-body" id="col-done"></div>
    </div>
  </div>
</div>

<script>
const COLS   = ['todo', 'progress', 'done'];
const LABELS = { todo: 'Por hacer', progress: 'En progreso', done: 'Hecho' };
const NEXT   = { todo: ['progress', 'done'], progress: ['todo', 'done'], done: ['todo', 'progress'] };

function load()  { try { return JSON.parse(localStorage.getItem('tasks') || '[]'); } catch { return []; } }
function save(t) { localStorage.setItem('tasks', JSON.stringify(t)); }

function pipClass(p) {
  if (p >= 8) return 'p-high';
  if (p >= 4) return 'p-mid';
  return 'p-low';
}

function sortItems(items, col) {
  return [...items].sort((a, b) => {
    const pa = a.priority ?? 5, pb = b.priority ?? 5;
    return col === 'done' ? pa - pb : pb - pa;
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const tasks = load();
  COLS.forEach(col => {
    const body  = document.getElementById('col-' + col);
    const badge = document.getElementById('badge-' + col);
    const items = sortItems(tasks.filter(t => t.col === col), col);
    badge.textContent = items.length;
    body.innerHTML = '';
    if (!items.length) {
      body.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M8 12h8M8 8h5M8 16h3"/>
        </svg>
        <p>Sin tareas</p>
      </div>`;
      return;
    }
    items.forEach(task => {
      const p = task.priority ?? 5;
      const card = document.createElement('div');
      card.className = 'card';
      const moves = NEXT[col].map(dest =>
        `<button class="move-chip" onclick="moveTask('${task.id}','${dest}')">→ ${LABELS[dest]}</button>`
      ).join('');
      const opts = Array.from({length:10},(_,i)=>10-i).map(n =>
        `<option value="${n}" ${n===p?'selected':''}>${n}</option>`
      ).join('');
      card.innerHTML = `
        <div class="card-top">
          <span class="pri-chip ${pipClass(p)}">${p}</span>
          <div class="card-text">${esc(task.text)}</div>
        </div>
        <button class="del-btn" onclick="deleteTask('${task.id}')" title="Eliminar">✕</button>
        <div class="card-footer">
          <div class="pri-row">
            <span class="pri-label">Prioridad</span>
            <select class="pri-sel" onchange="changePriority('${task.id}', this.value)">${opts}</select>
          </div>
          <div class="move-chips">${moves}</div>
        </div>`;
      body.appendChild(card);
    });
  });
  const total = tasks.length;
  document.getElementById('task-count').textContent =
    total === 0 ? 'Sin tareas' : total === 1 ? '1 tarea' : total + ' tareas';
}

function addTask(e) {
  e.preventDefault();
  const input  = document.getElementById('new-task');
  const priSel = document.getElementById('new-priority');
  const text   = input.value.trim();
  if (!text) return;
  const tasks = load();
  tasks.push({ id: Date.now().toString(), text, col: 'todo', priority: parseInt(priSel.value) });
  save(tasks);
  input.value = '';
  priSel.value = '5';
  render();
}

function moveTask(id, dest) {
  const tasks = load();
  const t = tasks.find(x => x.id === id);
  if (t) { t.col = dest; save(tasks); render(); }
}

function deleteTask(id) {
  save(load().filter(x => x.id !== id));
  render();
}

function changePriority(id, val) {
  const tasks = load();
  const t = tasks.find(x => x.id === id);
  if (t) { t.priority = parseInt(val); save(tasks); render(); }
}

render();
</script>
</body>
</html>
